set -g mouse on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ',*256col*:Tc'
set -ag terminal-overrides ",alacritty:RGB"
#run-shell "powerline-daemon -q"
#source "/home/alex/.local/lib/python2.7/site-packages/powerline/bindings/tmux/powerline.conf"
## NAVIGATION: ############################

# Switch panes 
# Usage: "ALT+arrow keys" (without prefix key)
# from https://gist.github.com/spicycode
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Switch windows 
# usage: "SHIFT+arrow" (without prefix key)
bind -n S-Left  previous-window
bind -n S-Right next-window

bind -n M-V split-window -v
bind -n M-H split-window -h


set -g default-terminal "screen-256color"


#pane border
set -g pane-border-style fg='#6272a4'
set -g pane-active-border-style fg='#ff79c6'
### DESIGN CHANGES ###
######################

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

#  modes
setw -g clock-mode-colour colour5
setw -g mode-style 'fg=colour250 bg=colour233 bold'

# panes
set -g pane-border-style 'fg=colour233 bg=colour233'
set -g pane-active-border-style 'bg=colour233 fg=colour240'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=colour233 fg=colour137 dim'
set -g status-left ''
set -g status-right '#[fg=colour231,bg=colour233] %d/%m #[fg=colour231,bg=colour233] %H:%M '
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-style 'fg=colour255 bg=colour4 bold'
setw -g window-status-current-format ' #I#[fg=colour249]:#[fg=colour250]#W#[fg=colour249]#F '

setw -g window-status-style 'fg=colour231 bg=colour235'
setw -g window-status-format ' #I#[fg=colour240]:#[fg=colour250]#W#[fg=colour244]#F '

setw -g window-status-bell-style 'fg=colour233 bg=colour1 bold'

# messages
set -g message-style 'fg=colour232 bg=colour16 bold'
set -g default-terminal "screen-256color"
set-option -g default-shell "/bin/bash"
set -g history-limit 100000

